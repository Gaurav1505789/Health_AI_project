<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Nearby Hospitals - Leaflet Map</title>
    
    <!-- Leaflet.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Custom CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-weight: 600;
            color: #555;
            font-size: 0.95em;
        }

        .control-group input,
        .control-group button {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .control-group input {
            background: white;
            color: #333;
        }

        .control-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-find {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            grid-column: 1 / -1;
        }

        .btn-find:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-find:active {
            transform: translateY(0);
        }

        .btn-find.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .status-message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            display: none;
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 2px solid #bee5eb;
        }

        /* Map Container */
        .map-wrapper {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            margin-bottom: 20px;
        }

        #map {
            background: #f0f0f0;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            min-height: 600px;
            z-index: 1;
        }

        .sidebar {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            max-height: 600px;
        }

        .sidebar h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .hospital-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .hospital-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .hospital-item:hover {
            background: #e8ebf8;
            transform: translateX(5px);
        }

        .hospital-item.active {
            background: #667eea;
            color: white;
            border-left-color: #764ba2;
        }

        .hospital-item h4 {
            margin: 0 0 5px 0;
            font-size: 0.95em;
        }

        .hospital-item p {
            margin: 3px 0;
            font-size: 0.85em;
            opacity: 0.8;
        }

        .hospital-distance {
            font-weight: 600;
            color: #667eea;
        }

        .hospital-item.active .hospital-distance {
            color: white;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }

        /* Map Legend */
        .map-legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            max-width: 200px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .legend-item:last-child {
            margin-bottom: 0;
        }

        .legend-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.8em;
        }

        .legend-patient {
            background: #667eea;
        }

        .legend-hospital {
            background: #e74c3c;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .map-wrapper {
                grid-template-columns: 1fr;
            }

            .sidebar {
                grid-column: 1;
                max-height: 300px;
            }

            #map {
                min-height: 400px;
            }
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            #map {
                min-height: 300px;
            }
        }

        /* Leaflet customization */
        .leaflet-container {
            border-radius: 12px;
            overflow: hidden;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 8px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.15);
        }

        .leaflet-popup-content {
            margin: 8px 12px;
            font-size: 0.95em;
        }

        .leaflet-popup-content h3 {
            margin: 0 0 8px 0;
            color: #667eea;
        }

        .leaflet-popup-content p {
            margin: 4px 0;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h1>🏥 Find Nearby Hospitals</h1>
                <button onclick="window.location.href='dashboard.html'" style="padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s ease;">← Back to Dashboard</button>
            </div>
            <p>Locate hospitals near you using real-time GPS and OpenStreetMap</p>

            <!-- Status Message -->
            <div id="statusMessage" class="status-message"></div>

            <!-- Controls -->
            <div class="controls">
                <div class="control-group">
                    <label for="latitude">📍 Latitude</label>
                    <input type="number" id="latitude" placeholder="Auto-detected" readonly>
                </div>

                <div class="control-group">
                    <label for="longitude">📍 Longitude</label>
                    <input type="number" id="longitude" placeholder="Auto-detected" readonly>
                </div>

                <div class="control-group">
                    <label for="radius">🔍 Radius (km)</label>
                    <input type="number" id="radius" value="5" min="1" max="50">
                </div>

                <button class="btn-find" id="findButton" onclick="findNearbyHospitals()">
                    🔍 Find Nearby Hospitals
                </button>
            </div>
        </div>

        <!-- Map and Sidebar -->
        <div class="map-wrapper">
            <!-- Leaflet Map -->
            <div id="map"></div>

            <!-- Sidebar with Hospital List -->
            <div class="sidebar">
                <h3>📋 Hospitals</h3>
                <div id="hospitalList" class="hospital-list">
                    <p class="empty-state">Click "Find Nearby Hospitals" to load</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet.js Library -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Main JavaScript -->
    <script>
        // ============================================
        // GLOBAL VARIABLES
        // ============================================

        let map = null;
        let patientMarker = null;
        let hospitalMarkers = [];
        let hospitals = [];
        let userLocation = null;

        // ============================================
        // INITIALIZE MAP ON PAGE LOAD
        // ============================================

        window.addEventListener('DOMContentLoaded', () => {
            initializeMap();
            locateUserWithLeaflet();
        });

        /**
         * Initialize Leaflet map centered on default location
         */
        function initializeMap() {
            // Default center (Delhi, India)
            const defaultCenter = [28.6139, 77.2090];

            // Create map
            map = L.map('map').setView(defaultCenter, 13);

            // Add OpenStreetMap tiles
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19,
                minZoom: 3
            }).addTo(map);

            // Add legend to map
            addMapLegend();

            showStatus('Map initialized. Click "Find Nearby Hospitals" to start.', 'info');
        }

        /**
         * Add legend to the map showing marker meanings
         */
        function addMapLegend() {
            const legend = L.control({ position: 'bottomright' });

            legend.onAdd = function () {
                const div = L.DomUtil.create('div', 'map-legend');
                div.innerHTML = `
                    <div class="legend-item">
                        <div class="legend-icon legend-patient">👤</div>
                        <span>Your Location</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-icon legend-hospital">🏥</div>
                        <span>Hospital</span>
                    </div>
                `;
                return div;
            };

            legend.addTo(map);
        }

        // ============================================
        // GEOLOCATION FUNCTIONS
        // ============================================

        /**
         * Use Leaflet's map.locate() to get patient location and center map
         * This is the recommended Leaflet.js way to handle geolocation
         */
        function locateUserWithLeaflet() {
            if (!map) {
                showStatus('❌ Map not initialized', 'error');
                return;
            }

            showStatus('📍 Getting your location with Leaflet...', 'info');

            // Use Leaflet's built-in locating with automatic map centering
            map.locate({ setView: true, maxZoom: 16 });

            // Handle location found event
            map.on('locationfound', (e) => {
                const lat = e.latitude;
                const lon = e.longitude;
                const accuracy = e.accuracy;

                userLocation = { lat, lon };

                // Update input fields with detected coordinates
                document.getElementById('latitude').value = lat.toFixed(6);
                document.getElementById('longitude').value = lon.toFixed(6);

                // Add patient marker at detected location
                addPatientMarker(lat, lon, accuracy);

                showStatus(`✓ Location detected by Leaflet! Accuracy: ±${Math.round(accuracy)}m`, 'success');
            });

            // Handle location error event
            map.on('locationerror', (e) => {
                showStatus(`❌ Location error: ${e.message}`, 'error');
                console.error('Leaflet location error:', e);
            });
        }

        /**
         * Add patient marker to map
         * @param {number} lat - Latitude
         * @param {number} lon - Longitude
         * @param {number} accuracy - GPS accuracy in meters
         */
        async function addPatientMarker(lat, lon, accuracy) {
            // Remove existing patient marker
            if (patientMarker) {
                map.removeLayer(patientMarker);
            }

            // Try to get address from OpenStreetMap
            let address = "Getting address...";
            try {
                const addressResponse = await fetch('http://localhost:5000/reverse-geocode', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        latitude: lat,
                        longitude: lon
                    })
                });
                
                if (addressResponse.ok) {
                    const addressData = await addressResponse.json();
                    address = addressData.display_name || "Address not found";
                }
            } catch (error) {
                console.log('Could not fetch address:', error);
                address = "Address lookup failed";
            }

            // Create custom icon for patient
            const patientIcon = L.divIcon({
                html: `<div style="background: #667eea; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.2);">👤</div>`,
                iconSize: [40, 40],
                className: 'patient-marker'
            });

            // Add marker to map
            patientMarker = L.marker([lat, lon], { icon: patientIcon })
                .bindPopup(`
                    <div>
                        <h3>📍 Your Location</h3>
                        <p><strong>Latitude:</strong> ${lat.toFixed(6)}</p>
                        <p><strong>Longitude:</strong> ${lon.toFixed(6)}</p>
                        <p><strong>Accuracy:</strong> ±${Math.round(accuracy)}m</p>
                        <p><strong>Address:</strong> ${address.substring(0, 100)}${address.length > 100 ? '...' : ''}</p>
                    </div>
                `)
                .addTo(map);

            // Add accuracy circle
            L.circle([lat, lon], {
                radius: accuracy,
                color: '#667eea',
                fillColor: '#667eea',
                fillOpacity: 0.1,
                weight: 2
            }).addTo(map);
        }

        // ============================================
        // OPENSTREETMAP OVERPASS API FUNCTIONS
        // ============================================

        /**
         * Search for hospitals using Overpass API
         * @param {number} lat - Patient latitude
         * @param {number} lon - Patient longitude
         * @param {number} radius - Search radius in kilometers
         * @returns {Promise<Array>} Array of hospital objects
         */
        async function searchHospitalsOverpass(lat, lon, radius) {
            const radiusMeters = radius * 1000;

            // Overpass API query
            const query = `
                [bbox:-90,-180,90,180];
                (
                    node["amenity"="hospital"](around:${radiusMeters},${lat},${lon});
                    way["amenity"="hospital"](around:${radiusMeters},${lat},${lon});
                    relation["amenity"="hospital"](around:${radiusMeters},${lat},${lon});
                );
                out center;
            `;

            const overpassUrl = 'https://overpass-api.de/api/interpreter';

            try {
                showStatus('🔍 Searching hospitals in OpenStreetMap...', 'info');

                const response = await fetch(overpassUrl, {
                    method: 'POST',
                    body: `data=${encodeURIComponent(query)}`
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.statusText}`);
                }

                const data = await response.json();

                // Process results
                const hospitalList = [];

                data.elements.forEach((element) => {
                    const hospitalLat = element.center ? element.center.lat : element.lat;
                    const hospitalLon = element.center ? element.center.lon : element.lon;
                    const hospitalName = element.tags?.name || 'Unknown Hospital';

                    if (hospitalLat && hospitalLon) {
                        const distance = calculateDistance(lat, lon, hospitalLat, hospitalLon);

                        hospitalList.push({
                            id: element.id,
                            name: hospitalName,
                            lat: hospitalLat,
                            lon: hospitalLon,
                            distance: distance,
                            website: element.tags?.website || '',
                            phone: element.tags?.phone || '',
                            address: element.tags?.address || 'Address not available'
                        });
                    }
                });

                // Sort by distance
                hospitalList.sort((a, b) => a.distance - b.distance);

                return hospitalList;
            } catch (error) {
                console.error('Overpass API error:', error);
                showStatus(`⚠️ Could not fetch from OpenStreetMap: ${error.message}`, 'error');
                return [];
            }
        }

        /**
         * Search hospitals using backend API (handles Overpass + fallback)
         * @param {number} lat - Patient latitude
         * @param {number} lon - Patient longitude
         * @param {number} radius - Search radius in kilometers
         * @returns {Promise<Array>} Array of hospital objects
         */
        async function searchHospitalsBackend(lat, lon, radius) {
            try {
                const response = await fetch('http://localhost:5000/nearby-hospitals', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        latitude: lat,
                        longitude: lon,
                        radius: radius
                    })
                });

                if (!response.ok) {
                    throw new Error('Backend API error');
                }

                const data = await response.json();

                if (data.success && data.hospitals) {
                    // Convert backend format to frontend format
                    return data.hospitals.map(h => ({
                        id: h.id,
                        name: h.name,
                        lat: h.latitude,
                        lon: h.longitude,
                        distance: h.distance,
                        website: h.website || '',
                        phone: h.phone || '',
                        address: h.address || h.location || 'Address not available'
                    }));
                }

                return [];
            } catch (error) {
                console.error('Backend API error:', error);
                return [];
            }
        }

        // ============================================
        // DISTANCE CALCULATION (HAVERSINE FORMULA)
        // ============================================

        /**
         * Calculate distance between two GPS coordinates
         * @param {number} lat1 - First latitude
         * @param {number} lon1 - First longitude
         * @param {number} lat2 - Second latitude
         * @param {number} lon2 - Second longitude
         * @returns {number} Distance in kilometers
         */
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Earth's radius in km
            const dLat = ((lat2 - lat1) * Math.PI) / 180;
            const dLon = ((lon2 - lon1) * Math.PI) / 180;

            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos((lat1 * Math.PI) / 180) *
                Math.cos((lat2 * Math.PI) / 180) *
                Math.sin(dLon / 2) *
                Math.sin(dLon / 2);

            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            const distance = R * c;

            return parseFloat(distance.toFixed(2));
        }

        // ============================================
        // MAIN HOSPITAL FINDER FUNCTION
        // ============================================

        /**
         * Main function to find and display nearby hospitals
         */
        async function findNearbyHospitals() {
            // Validate location
            if (!userLocation) {
                showStatus('❌ Please enable location access first', 'error');
                return;
            }

            const radius = parseFloat(document.getElementById('radius').value);

            if (radius < 1 || radius > 50) {
                showStatus('❌ Radius must be between 1 and 50 km', 'error');
                return;
            }

            // Disable button and show loading
            const findButton = document.getElementById('findButton');
            findButton.disabled = true;
            findButton.innerHTML = '<span class="spinner"></span> Searching...';

            try {
                // Use backend API which handles Overpass with fallback
                showStatus('🔍 Searching hospitals...', 'info');
                const hospitalList = await searchHospitalsBackend(userLocation.lat, userLocation.lon, radius);

                // Check if found hospitals
                if (hospitalList.length === 0) {
                    showStatus(`❌ No hospitals found within ${radius} km radius`, 'error');
                    clearHospitalMarkers();
                    renderHospitalList([]);
                } else {
                    hospitals = hospitalList;
                    showStatus(`✓ Found ${hospitalList.length} hospitals!`, 'success');
                    displayHospitalsOnMap(hospitalList);
                    renderHospitalList(hospitalList);
                }
            } catch (error) {
                console.error('Error finding hospitals:', error);
                showStatus('❌ Error searching for hospitals', 'error');
            } finally {
                // Re-enable button
                findButton.disabled = false;
                findButton.innerHTML = '🔍 Find Nearby Hospitals';
            }
        }

        // ============================================
        // MAP DISPLAY FUNCTIONS
        // ============================================

        /**
         * Clear all hospital markers from map
         */
        function clearHospitalMarkers() {
            hospitalMarkers.forEach((marker) => {
                map.removeLayer(marker);
            });
            hospitalMarkers = [];
        }

        /**
         * Display hospitals as markers on Leaflet map
         * @param {Array} hospitalList - Array of hospital objects
         */
        function displayHospitalsOnMap(hospitalList) {
            clearHospitalMarkers();

            // Create markers for each hospital
            hospitalList.forEach((hospital, index) => {
                // Custom hospital icon
                const hospitalIcon = L.divIcon({
                    html: `<div style="background: #e74c3c; color: white; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.2); font-weight: bold;">${index + 1}</div>`,
                    iconSize: [36, 36],
                    className: 'hospital-marker'
                });

                // Create marker
                const marker = L.marker([hospital.lat, hospital.lon], { icon: hospitalIcon })
                    .bindPopup(`
                        <div>
                            <h3>🏥 ${hospital.name}</h3>
                            <p><strong>Distance:</strong> ${hospital.distance} km</p>
                            <p><strong>Address:</strong> ${hospital.address}</p>
                            ${hospital.phone ? `<p><strong>Phone:</strong> <a href="tel:${hospital.phone}">${hospital.phone}</a></p>` : ''}
                        </div>
                    `)
                    .addTo(map);

                hospitalMarkers.push(marker);

                // Add event listener for sidebar interaction
                marker.on('click', () => {
                    highlightHospitalInList(hospital.id);
                });
            });

            // Auto-fit map to show all markers
            fitMapToMarkers();
        }

        /**
         * Auto-fit map to show all hospitals and patient location
         */
        function fitMapToMarkers() {
            if (hospitalMarkers.length === 0) return;

            const group = new L.featureGroup([patientMarker, ...hospitalMarkers]);
            map.fitBounds(group.getBounds(), { padding: [50, 50] });
        }

        // ============================================
        // SIDEBAR FUNCTIONS
        // ============================================

        /**
         * Render hospital list in sidebar
         * @param {Array} hospitalList - Array of hospital objects
         */
        function renderHospitalList(hospitalList) {
            const hospitalList_DOM = document.getElementById('hospitalList');

            if (hospitalList.length === 0) {
                hospitalList_DOM.innerHTML = '<p class="empty-state">No hospitals found</p>';
                return;
            }

            hospitalList_DOM.innerHTML = hospitalList.map((hospital) => `
                <div class="hospital-item" onclick="onHospitalClick('${hospital.id}')">
                    <h4>🏥 ${hospital.name}</h4>
                    <p class="hospital-distance">📏 ${hospital.distance} km away</p>
                    <p>${hospital.address || 'Address not available'}</p>
                </div>
            `).join('');
        }

        /**
         * Handle hospital click in sidebar
         * @param {string} hospitalId - Hospital ID
         */
        function onHospitalClick(hospitalId) {
            const hospital = hospitals.find((h) => h.id == hospitalId);
            if (hospital) {
                map.setView([hospital.lat, hospital.lon], 17);
                highlightHospitalInList(hospitalId);
            }
        }

        /**
         * Highlight hospital in sidebar list
         * @param {string} hospitalId - Hospital ID
         */
        function highlightHospitalInList(hospitalId) {
            // Remove active class from all items
            document.querySelectorAll('.hospital-item').forEach((item) => {
                item.classList.remove('active');
            });

            // Add active class to clicked item
            const items = document.querySelectorAll('.hospital-item');
            items.forEach((item) => {
                if (item.onclick && item.onclick.toString().includes(hospitalId)) {
                    item.classList.add('active');
                }
            });
        }

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================

        /**
         * Display status message to user
         * @param {string} message - Status message text
         * @param {string} type - Message type ('success', 'error', 'info')
         */
        function showStatus(message, type = 'info') {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = `status-message show ${type}`;

            // Auto-hide info/success messages after 5 seconds
            if (type !== 'error') {
                setTimeout(() => {
                    statusEl.classList.remove('show');
                }, 5000);
            }
        }
    </script>
</body>
</html>
